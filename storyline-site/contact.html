        <h1>Contact Me</h1>
        <p>Have questions or feedback? Send me a message!</p>

        <div class="container" id="contact-container">
            <form id="contactForm" class="p-4 rounded shadow bg-dark text-light">

                <div class="mb-3">
                    <label class="form-label">Your Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Your Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea id="message" class="form-control" rows="4" required></textarea>
                </div>

                <button type="button" id="sendMessage" class="btn btn-primary w-100">
                    Send Message
                </button>

            </form>

            <div id="contactResult" class="mt-3 text-center"></div>
        </div>

        <footer>
            Shayna Ariella Scott - Story-Driven Gaming - 2026
        </footer>

        <script src="script.js"></script>
    </body>
